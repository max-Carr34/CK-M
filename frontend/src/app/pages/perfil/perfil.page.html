<app-sidebar-menu 
  #sidebarMenuRef 
  [isMenuOpen]="isMenuOpen" 
  (menuOpenChange)="isMenuOpen = $event">
</app-sidebar-menu>

<ion-header [translucent]="true">
  <ion-toolbar>
    <button class="menu-button" (click)="toggleMenu()" [class.open]="isMenuOpen" slot="start">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ion-title>Perfil</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">

  <!-- HEADER -->
  <div class="welcome-section">
    <ion-avatar class="user-avatar">
      <ion-icon name="person-circle-outline"></ion-icon>
    </ion-avatar>

    <h2>¡Hola, {{ userName }}!</h2>
    <p class="user-email">{{ userEmail }}</p>
  </div>

  <!-- PEDIDOS -->
  <ion-card *ngIf="orders.length > 0">
    <ion-card-header>
      <ion-card-title>Mis Pedidos</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-list>
        <ion-item *ngFor="let order of orders" button (click)="viewOrder(order)">
          <ion-icon name="receipt-outline" slot="start"></ion-icon>

          <ion-label>
            <h3>Pedido #{{ order.id }}</h3>
            <p>{{ order.created_at || order.date }} - {{ order.status }}</p>
            <p>Total: ${{ order.total }}</p>
          </ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <!-- EMPTY -->
  <ion-card *ngIf="orders.length === 0">
    <ion-card-header>
      <ion-card-title>Mis Pedidos</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <div class="empty-state">
        <ion-icon name="bag-outline" size="large"></ion-icon>
        <p>Aún no tienes pedidos</p>
      </div>
    </ion-card-content>
  </ion-card>

  <!-- COMPRAR DE NUEVO -->
  <ion-card *ngIf="recentProducts.length > 0">
    <ion-card-header>
      <ion-card-title>Comprar de Nuevo</ion-card-title>
    </ion-card-header>

    <ion-card-content>
      <ion-list>
        <ion-item *ngFor="let product of recentProducts">

          <ion-thumbnail slot="start">
            <img [src]="product.image" [alt]="product.name">
          </ion-thumbnail>

          <ion-label>
            <h3>{{ product.name }}</h3>
            <p>${{ product.price }}</p>
          </ion-label>

          <ion-button 
            slot="end" 
            fill="outline" 
            size="small"
            (click)="addToCart(product)"
          >
            <ion-icon name="cart-outline" slot="start"></ion-icon>
            Agregar
          </ion-button>

        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <!-- LOGOUT -->
  <ion-item button lines="none" (click)="logout()">
    <ion-icon name="log-out-outline" slot="start" color="danger"></ion-icon>
    <ion-label color="danger">
      <h3>Cerrar Sesión</h3>
    </ion-label>
  </ion-item>

</ion-content>
