<app-sidebar-menu #sidebarMenuRef [isMenuOpen]="isMenuOpen" (menuOpenChange)="isMenuOpen = $event"></app-sidebar-menu>

<ion-header [translucent]="true">
  <ion-toolbar>
    <button class="menu-button" (click)="toggleMenu()" [class.open]="isMenuOpen" slot="start">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <ion-title>menu</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">menu</ion-title>
    </ion-toolbar>
  </ion-header>
</ion-content>
