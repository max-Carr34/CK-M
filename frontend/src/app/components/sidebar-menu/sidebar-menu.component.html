<!-- OVERLAY -->
<div class="menu-overlay"
     [class.show]="isMenuOpen"
     (click)="closeMenu()">
</div>

<!-- SIDEBAR -->
<div class="sidebar-menu" [class.open]="isMenuOpen">

  <!-- HEADER -->
  <div class="sidebar-header">

    <div class="sidebar-avatar">
      {{ getInitials() }}
    </div>

    <div class="sidebar-user">
      <div class="sidebar-user__name">
        {{ userName }}
      </div>
      <div class="sidebar-user__email">
        {{ userEmail }}
      </div>
    </div>

    <button class="close-btn" (click)="closeMenu()">✕</button>
  </div>

  <!-- NAV -->
  <div class="sidebar-nav">

    <div class="nav-group-label">General</div>

    <button
      *ngFor="let item of menuItems"
      class="sidebar-item"
      [class.active]="selected === item.key"
      (click)="handleMenuOption(item.key)"
    >
      <div class="sidebar-item__icon">
        {{ item.icon }}
      </div>

      <div class="sidebar-item__label">
        {{ item.label }}
      </div>
    </button>

    <div class="sidebar-divider"></div>

    <!-- LOGOUT -->
    <button
      class="sidebar-item logout-item"
      (click)="handleMenuOption('logout')"
    >
      <div class="sidebar-item__icon">🚪</div>
      <div class="sidebar-item__label">Cerrar sesión</div>
    </button>

  </div>
</div>
